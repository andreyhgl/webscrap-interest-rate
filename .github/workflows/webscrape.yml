name: webscrape

on:
  schedule:
    - cron: '0 10 * * 1-5' # mon - fri
  workflow_dispatch:

jobs:
  check-homepage:
    runs-on: ubuntu-latest

    # use docker image, no need to install dependencies
    container:
      image: ghcr.io/andreyhgl/py-webscrape:latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      # Run the scraper. The script reads/writes swedbank.csv in the current
      # dir, which is the repo root after checkout.
      - name: run scraper
        run: python bin/webscrape.py

      - name: setup git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Check if the scraper produced changes and commit if so.
      - name: check for changes
        id: check
        run: |
          if [[ -n "$(git status --porcelain swedbank.csv)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swedbank.csv
          git commit -m "github-actions: append new values @ $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin

      - name: no update
        if: steps.check.outputs.changed == 'false'
        run: echo "No update to swedbank.csv — nothing to commit"

  plot:
    needs: check-homepage
    if: needs.check-homepage.outputs.changed == 'true'
    uses: ./.github/workflows/render_lineplot.yml